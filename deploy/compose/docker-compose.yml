name: vexa
services:
  # --- Infrastructure ---

  redis:
    image: redis:7.0-alpine
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - vexa
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    # idle_in_transaction_session_timeout=60s auto-kills orphaned transactions
    # (defense-in-depth against future DB session leaks in meeting-api).
    command: ["postgres", "-c", "idle_in_transaction_session_timeout=60000"]
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5458}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    ports:
      # v0.10.5.3 Pack D-3 follow-up (Option B):
      # MINIO_HOST_BIND defaults to 127.0.0.1 (safe — only the host can reach
      # MinIO; presigned URLs only work for browsers running on the host).
      # For external-browser audio playback (e.g. dashboard accessed from a
      # remote machine), set MINIO_HOST_BIND=0.0.0.0 + set MINIO_PUBLIC_ENDPOINT
      # to e.g. http://<host-public-ip>:${MINIO_HOST_PORT}. The presigned URL
      # signature uses MINIO_PUBLIC_ENDPOINT; without that env, presigned URLs
      # carry the in-network hostname `minio:9000` which only resolves inside
      # the docker bridge network.
      - "${MINIO_HOST_BIND:-127.0.0.1}:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - vexa
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa

  # --- Core services ---

  admin-api:
    build:
      context: ../..
      dockerfile: services/admin-api/Dockerfile
    image: vexaai/admin-api:${IMAGE_TAG}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8057}:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa
    restart: unless-stopped

  runtime-api:
    build:
      context: ../../services/runtime-api
      dockerfile: Dockerfile
    image: vexaai/runtime-api:${IMAGE_TAG}
    group_add:
      - "${DOCKER_GID:-998}"
    ports:
      - "127.0.0.1:${RUNTIME_API_PORT:-8090}:8090"
    environment:
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
      - AGENT_IMAGE=${AGENT_IMAGE}
      - BROWSER_IMAGE=${BROWSER_IMAGE}
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - WAKE_STT_URL=${WAKE_STT_URL:-}
      - WAKE_STT_TOKEN=${WAKE_STT_TOKEN:-}
      - WAKE_STT_API_TOKEN=${WAKE_STT_API_TOKEN:-}
      - WAKE_STT_FLUSH_INTERVAL_MS=${WAKE_STT_FLUSH_INTERVAL_MS:-500}
      - WAKE_STT_MAX_BATCH_DURATION_MS=${WAKE_STT_MAX_BATCH_DURATION_MS:-1200}
      - WAKE_STT_MAX_IN_FLIGHT=${WAKE_STT_MAX_IN_FLIGHT:-4}
      - WAKE_STREAM_MIN_AUDIO_DURATION_SEC=${WAKE_STREAM_MIN_AUDIO_DURATION_SEC:-1}
      - WAKE_STREAM_SUBMIT_INTERVAL_SEC=${WAKE_STREAM_SUBMIT_INTERVAL_SEC:-1}
      - WAKE_STREAM_CONFIRM_THRESHOLD=${WAKE_STREAM_CONFIRM_THRESHOLD:-1}
      - WAKE_STREAM_MAX_BUFFER_DURATION_SEC=${WAKE_STREAM_MAX_BUFFER_DURATION_SEC:-15}
      - WAKE_STREAM_IDLE_TIMEOUT_SEC=${WAKE_STREAM_IDLE_TIMEOUT_SEC:-5}
      - TTS_SERVICE_URL=http://tts-service:8002
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
      - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - API_KEYS=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - PROFILES_PATH=/app/profiles.yaml
      - ALLOW_PRIVATE_CALLBACKS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../services/runtime-api/profiles.yaml:/app/profiles.yaml:ro
    init: true
    depends_on:
      - redis
      - postgres
    networks:
      - vexa
    restart: unless-stopped

  # agent-api: NO-SHIP for 0.10 — not included in release
  # agent-api:
  #   build:
  #     context: ../..
  #     dockerfile: services/agent-api/Dockerfile
  #   image: vexaai/agent-api:${IMAGE_TAG}
  #   ports:
  #     - "${AGENT_API_PORT:-8100}:8100"
  #   environment:
  #     - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
  #     - AGENT_IMAGE=${AGENT_IMAGE:-vexaai/vexa-agent:${IMAGE_TAG}}
  #     - STORAGE_BACKEND=s3
  #     - S3_ENDPOINT=http://minio:9000
  #     - S3_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
  #     - S3_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
  #     - S3_BUCKET=${MINIO_BUCKET:-vexa}
  #     - CLAUDE_CREDENTIALS_PATH=${CLAUDE_CREDENTIALS_PATH}
  #     - CLAUDE_JSON_PATH=${CLAUDE_JSON_PATH}
  #     - IDLE_TIMEOUT=${IDLE_TIMEOUT:-300}
  #     - REDIS_URL=redis://redis:6379
  #     - RUNTIME_API_URL=http://runtime-api:8090
  #     - ADMIN_API_URL=http://admin-api:8001
  #     - ADMIN_API_TOKEN=${ADMIN_TOKEN:-vexa-admin-token}
  #     - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
  #     - AGENT_API_INTERNAL_URL=http://agent-api:8100
  #     - API_KEY=${BOT_API_TOKEN:-}
  #     - BOT_API_TOKEN=${BOT_API_TOKEN:-}
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   depends_on:
  #     minio-init:
  #       condition: service_completed_successfully
  #     redis:
  #       condition: service_started
  #     runtime-api:
  #       condition: service_started
  #   networks:
  #     - vexa
  #   restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    image: vexaai/api-gateway:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${API_GATEWAY_HOST_PORT:-8056}:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - MEETING_API_URL=http://meeting-api:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - MCP_URL=http://mcp:18888
      - CALENDAR_SERVICE_URL=http://calendar-service:8050
      - AGENT_API_URL=http://agent-api:8100
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - vexa
    restart: unless-stopped

  meeting-api:
    build:
      context: ../..
      dockerfile: services/meeting-api/Dockerfile
    image: vexaai/meeting-api:${IMAGE_TAG}
    mem_limit: 1g
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_TOKEN=${ADMIN_API_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - RUNTIME_API_URL=http://runtime-api:8090
      - RUNTIME_API_TOKEN=${BOT_API_TOKEN:-}
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_IMAGE_NAME=${BROWSER_IMAGE}
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-vexa}_vexa
      - TTS_SERVICE_URL=http://tts-service:8002
      # agent-api is not shipped in this compose profile. Operators can opt in
      # with POST_MEETING_HOOKS, but the default must not point at a disabled
      # service or every completed meeting emits DNS errors before handoff.
      - POST_MEETING_HOOKS=${POST_MEETING_HOOKS:-}
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      # v0.10.5.3 Pack D-3 follow-up (Option B): browser-reachable MinIO
      # endpoint for presigned download URLs. Default falls back to the
      # internal hostname which works for in-network browsers (compose VM
      # reachable on its own LAN). For external browser access set this
      # to e.g. http://${HOST_PUBLIC_IP}:9000 in .env. storage.py uses
      # this only when signing URLs; server-side I/O still uses
      # MINIO_ENDPOINT for fast in-cluster reads.
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      # GCS backend (issue #1) — only used when STORAGE_BACKEND=gcs. Auth is
      # ADC/Workload Identity; mount creds or run on GCP. See deploy/gcs/README.md.
      - GCS_BUCKET=${GCS_BUCKET:-}
      - GCS_PROJECT=${GCS_PROJECT:-}
      - GCS_SIGNING_SERVICE_ACCOUNT=${GCS_SIGNING_SERVICE_ACCOUNT:-}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-${GCS_PROJECT:-}}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/google/application_default_credentials.json}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-true}
      - CAPTURE_MODES=${CAPTURE_MODES:-audio}
      - RECORD_PARTICIPANT_LANES=${RECORD_PARTICIPANT_LANES:-false}
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      # Deferred (post-meeting) STT model; stt-async-* routes to the Soniox
      # diarization adapter in transcription-service (issues #21/#22).
      - DEFERRED_TRANSCRIPTION_MODEL=${DEFERRED_TRANSCRIPTION_MODEL:-large-v3-turbo}
      # Deferred-only STT endpoint override; realtime bots keep using
      # TRANSCRIPTION_SERVICE_URL. Empty = same endpoint as realtime.
      - DEFERRED_TRANSCRIPTION_SERVICE_URL=${DEFERRED_TRANSCRIPTION_SERVICE_URL:-}
      - DEFERRED_TRANSCRIPTION_SERVICE_TOKEN=${DEFERRED_TRANSCRIPTION_SERVICE_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - KABOSU_GOOGLE_REFRESH_TOKEN=${KABOSU_GOOGLE_REFRESH_TOKEN:-}
      - KABOSU_DRIVE_FOLDER_ID=${KABOSU_DRIVE_FOLDER_ID:-}
      - KABOSU_DRIVE_EXPORT_ENABLED=${KABOSU_DRIVE_EXPORT_ENABLED:-true}
      - WAKE_STT_URL=${WAKE_STT_URL:-}
      - WAKE_STT_TOKEN=${WAKE_STT_TOKEN:-}
      - WAKE_STT_API_TOKEN=${WAKE_STT_API_TOKEN:-}
      - WAKE_STT_FLUSH_INTERVAL_MS=${WAKE_STT_FLUSH_INTERVAL_MS:-500}
      - WAKE_STT_MAX_BATCH_DURATION_MS=${WAKE_STT_MAX_BATCH_DURATION_MS:-1200}
      - WAKE_STT_MAX_IN_FLIGHT=${WAKE_STT_MAX_IN_FLIGHT:-4}
      - WAKE_STREAM_MIN_AUDIO_DURATION_SEC=${WAKE_STREAM_MIN_AUDIO_DURATION_SEC:-1}
      - WAKE_STREAM_SUBMIT_INTERVAL_SEC=${WAKE_STREAM_SUBMIT_INTERVAL_SEC:-1}
      - WAKE_STREAM_CONFIRM_THRESHOLD=${WAKE_STREAM_CONFIRM_THRESHOLD:-1}
      - WAKE_STREAM_MAX_BUFFER_DURATION_SEC=${WAKE_STREAM_MAX_BUFFER_DURATION_SEC:-15}
      - WAKE_STREAM_IDLE_TIMEOUT_SEC=${WAKE_STREAM_IDLE_TIMEOUT_SEC:-5}
      - TRANSCRIPTION_GATEWAY_URL=${TRANSCRIPTION_GATEWAY_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ${LOCAL_STORAGE_VOLUME_SOURCE:-recordings-data}:/data/recordings
      - ${GOOGLE_APPLICATION_CREDENTIALS_HOST:-/dev/null}:${GOOGLE_APPLICATION_CREDENTIALS:-/var/secrets/google/application_default_credentials.json}:ro
    init: true
    depends_on:
      - redis
      - postgres
      - runtime-api
    networks:
      - vexa
    restart: unless-stopped

  # --- Optional services ---

  # telegram-bot: NO-SHIP for 0.10 — not included in release
  # telegram-bot:
  #   build:
  #     context: ../..
  #     dockerfile: services/telegram-bot/Dockerfile
  #   image: vexaai/telegram-bot:${IMAGE_TAG}
  #   expose:
  #     - "8200"
  #   environment:
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
  #     - CHAT_API_URL=http://agent-api:8100
  #     - CHAT_DEFAULT_USER_ID=${CHAT_DEFAULT_USER_ID:-}
  #     - CHAT_USER_MAP=${CHAT_USER_MAP:-{}}
  #     - TELEGRAM_BOT_PORT=8200
  #     - LOG_LEVEL=${LOG_LEVEL:-INFO}
  #   depends_on:
  #     - agent-api
  #   networks:
  #     - vexa
  #   restart: unless-stopped

  mcp:
    build:
      context: ../..
      dockerfile: services/mcp/Dockerfile
    image: vexaai/mcp:${IMAGE_TAG}
    mem_limit: 512m
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-18888}:18888"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  dashboard:
    build:
      context: ../..
      dockerfile: services/dashboard/Dockerfile
      # Release identity guard: the dashboard Dockerfile copies VERSION and
      # Chart.yaml into the build and rejects a stale VEXA_VERSION override.
      # Empty VEXA_VERSION is allowed; the generator then uses VERSION.
      args:
        NEXT_PUBLIC_VEXA_OSS_VERSION: ${VEXA_VERSION:-}
        NEXT_PUBLIC_VEXA_OSS_RELEASE_DATE: ${VEXA_RELEASE_DATE:-}
        VEXA_API_URL: http://api-gateway:8000
    image: vexaai/dashboard:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${DASHBOARD_HOST_PORT:-3001}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-}
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-8056}
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN:-changeme}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - VEXA_AUTH_COOKIE_NAME=${VEXA_AUTH_COOKIE_NAME:-vexa-token-compose}
      - VEXA_USER_INFO_COOKIE_NAME=${VEXA_USER_INFO_COOKIE_NAME:-vexa-user-info-compose}
      - VEXA_ALLOW_DIRECT_LOGIN=${VEXA_ALLOW_DIRECT_LOGIN:-true}
      - MINIO_INTERNAL_ENDPOINT=${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
      - DASHBOARD_BRAND_NAME=${DASHBOARD_BRAND_NAME:-カボス}
      - DASHBOARD_BRAND_SHORT_NAME=${DASHBOARD_BRAND_SHORT_NAME:-カボス}
      - DASHBOARD_BRAND_SLUG=${DASHBOARD_BRAND_SLUG:-kabosu}
      - DASHBOARD_LOCALE=${DASHBOARD_LOCALE:-ja}
      - DEFAULT_BOT_NAME=${DEFAULT_BOT_NAME:-カボス}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  kabosu-dashboard:
    profiles: ["kabosu"]
    build:
      context: ../..
      dockerfile: services/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_VEXA_OSS_VERSION: ${VEXA_VERSION:-}
        NEXT_PUBLIC_VEXA_OSS_RELEASE_DATE: ${VEXA_RELEASE_DATE:-}
        VEXA_API_URL: http://api-gateway:8000
    image: vexaai/dashboard:${IMAGE_TAG}
    mem_limit: 1g
    ports:
      - "${KABOSU_DASHBOARD_HOST_PORT:-3002}:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-}
      - API_GATEWAY_HOST_PORT=${API_GATEWAY_HOST_PORT:-8056}
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN:-changeme}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - VEXA_AUTH_COOKIE_NAME=${KABOSU_AUTH_COOKIE_NAME:-kabosu-token-compose}
      - VEXA_USER_INFO_COOKIE_NAME=${KABOSU_USER_INFO_COOKIE_NAME:-kabosu-user-info-compose}
      - VEXA_ALLOW_DIRECT_LOGIN=${VEXA_ALLOW_DIRECT_LOGIN:-true}
      - MINIO_INTERNAL_ENDPOINT=${MINIO_INTERNAL_ENDPOINT:-http://minio:9000}
      - NEXT_PUBLIC_APP_URL=${KABOSU_NEXT_PUBLIC_APP_URL:-}
      - DASHBOARD_BRAND_NAME=${KABOSU_DASHBOARD_BRAND_NAME:-カボス}
      - DASHBOARD_BRAND_SHORT_NAME=${KABOSU_DASHBOARD_BRAND_SHORT_NAME:-カボス}
      - DASHBOARD_BRAND_SLUG=${KABOSU_DASHBOARD_BRAND_SLUG:-kabosu}
      - DASHBOARD_LOCALE=${KABOSU_DASHBOARD_LOCALE:-ja}
      - DASHBOARD_BRAND_LOGO_DARK=${KABOSU_DASHBOARD_LOGO_DARK:-/icons/kabosu.svg}
      - DASHBOARD_BRAND_LOGO_LIGHT=${KABOSU_DASHBOARD_LOGO_LIGHT:-/icons/kabosu.svg}
      - DEFAULT_BOT_NAME=${KABOSU_DEFAULT_BOT_NAME:-カボス}
      - DASHBOARD_SHARED_AUTH_ENABLED=${KABOSU_DASHBOARD_SHARED_AUTH_ENABLED:-true}
      - DASHBOARD_SHARED_AUTH_EMAIL=${KABOSU_DASHBOARD_SHARED_AUTH_EMAIL:-tech@bonginkan.ai}
      - DASHBOARD_SHARED_AUTH_NAME=${KABOSU_DASHBOARD_SHARED_AUTH_NAME:-カボス運用}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  tts-service:
    profiles: ["tts"]
    build:
      context: ../..
      dockerfile: services/tts-service/Dockerfile
    image: vexaai/tts-service:${IMAGE_TAG}
    mem_limit: 1g
    expose:
      - "8002"
    # Host-expose TTS for pack-lane probes; override in isolated lanes.
    # v0.10.6.1 (scope.yaml tts-auto-language-detection.code_to_change):
    # host-expose the TTS port so host-side proves (TTS_AUTO_LANG_PICKS_RIGHT_VOICE,
    # TTS_NEW_LANG_VOICE_AUTO_DOWNLOAD_CACHED) can curl localhost:8002.
    ports:
      - "127.0.0.1:${TTS_SERVICE_HOST_PORT:-8002}:8002"
    environment:
      - PIPER_DEFAULT_VOICES=${PIPER_DEFAULT_VOICES:-major}
      - PIPER_LOAD_VOICES=${PIPER_LOAD_VOICES:-en_US-amy-medium,en_US-danny-low,pt_BR-faber-medium,es_ES-davefx-medium}
      - PIPER_PRELOAD_STRICT=${PIPER_PRELOAD_STRICT:-true}
      - TTS_API_TOKEN=${TTS_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tts-voices:/app/voices
    init: true

# kabosu-dashboard を Cloud Build でビルドする設定。
# arm64 Mac 上の qemu エミュレーション（docker buildx --platform linux/amd64）では
# Next.js/SWC のビルドが segfault するため、amd64 ネイティブの Cloud Build を使う。
# 手動実行例:
#   gcloud builds submit --config deploy/gcp/cloudbuild-dashboard.yaml \
#     --substitutions _VEXA_API_URL=https://<api-host> .
#
# main ブランチ用GitHub Actionsではpushされたcommit SHAを_DEPLOY_SHAへ渡し、
# Cloud BuildがそのSHAをイメージタグに使って、
# push 完了後に kabosu-dashboard の Cloud Run revision を同じイメージへ更新する。
substitutions:
  _REGION: asia-northeast1
  _REPOSITORY: pm-qe-management
  _SERVICE: kabosu-dashboard
  _DEPLOY_SHA: manual-${BUILD_ID}
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${_DEPLOY_SHA}
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f", "services/dashboard/Dockerfile",
        "--build-arg", "VEXA_API_URL=${_VEXA_API_URL}",
        "-t", "${_IMAGE}",
        ".",
      ]
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE}"]
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      [
        "run", "services", "update", "${_SERVICE}",
        "--image", "${_IMAGE}",
        "--region", "${_REGION}",
        "--project", "${PROJECT_ID}",
        "--quiet",
      ]
timeout: 1800s
options:
  machineType: E2_HIGHCPU_8
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY

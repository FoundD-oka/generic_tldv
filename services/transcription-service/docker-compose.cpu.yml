version: '3.8'

# CPU-only version for testing without GPU
services:
  # Nginx load balancer
  transcription-api:
    image: nginx:alpine
    container_name: transcription-lb-cpu
    ports:
      - "8083:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - transcription-worker-1
      # - transcription-worker-2
      # - transcription-worker-3
    restart: unless-stopped
    networks:
      transcription-net:
      vexa-network:
        aliases:
          - transcription-service
          # Alias for vexa docker compose to connect to this dev transcription service

  # Worker 1 (CPU)
  transcription-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: transcription-worker-1-cpu
    environment:
      - WORKER_ID=1
      - MODEL_SIZE=${MODEL_SIZE:-medium}
      - DEVICE=cpu
      - COMPUTE_TYPE=int8
      - CPU_THREADS=${CPU_THREADS:-0}
      # Soniox async diarization route for stt-async-* models (issue #21)
      - SONIOX_API_KEY=${SONIOX_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MAX_AUDIO_BYTES=${GEMINI_MAX_AUDIO_BYTES:-419430400}
      - GEMINI_MAX_AUDIO_DURATION_SECONDS=${GEMINI_MAX_AUDIO_DURATION_SECONDS:-10800}
      - GEMINI_OPERATION_TIMEOUT_SECONDS=${GEMINI_OPERATION_TIMEOUT_SECONDS:-1500}
      - GEMINI_HTTP_TIMEOUT_SECONDS=${GEMINI_HTTP_TIMEOUT_SECONDS:-300}
      - GEMINI_MAX_CONCURRENCY=${GEMINI_MAX_CONCURRENCY:-1}
      - GEMINI_CHUNK_DURATION_SECONDS=${GEMINI_CHUNK_DURATION_SECONDS:-300}
      - GEMINI_CHUNK_OVERLAP_SECONDS=${GEMINI_CHUNK_OVERLAP_SECONDS:-5}
      - GEMINI_MIN_CHUNK_DURATION_SECONDS=${GEMINI_MIN_CHUNK_DURATION_SECONDS:-60}
      - GEMINI_MAX_CHUNK_SPLIT_DEPTH=${GEMINI_MAX_CHUNK_SPLIT_DEPTH:-3}
      - GEMINI_MAX_OUTPUT_TOKENS=${GEMINI_MAX_OUTPUT_TOKENS:-65536}
      - GEMINI_THINKING_LEVEL=${GEMINI_THINKING_LEVEL:-minimal}
    volumes:
      - ./models:/app/models
    restart: unless-stopped
    networks:
      - transcription-net

  # # Worker 2 (CPU)
  # transcription-worker-2:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.cpu
  #   container_name: transcription-worker-2-cpu
  #   environment:
  #     - WORKER_ID=2
  #     - MODEL_SIZE=${MODEL_SIZE:-medium}
  #     - DEVICE=cpu
  #     - COMPUTE_TYPE=int8
  #     - CPU_THREADS=${CPU_THREADS:-0}
  #   volumes:
  #     - ./models:/app/models
  #   restart: unless-stopped
  #   networks:
  #     - transcription-net

  # # Worker 3 (CPU)
  # transcription-worker-3:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.cpu
  #   container_name: transcription-worker-3-cpu
  #   environment:
  #     - WORKER_ID=3
  #     - MODEL_SIZE=${MODEL_SIZE:-medium}
  #     - DEVICE=cpu
  #     - COMPUTE_TYPE=int8
  #     - CPU_THREADS=${CPU_THREADS:-0}
  #   volumes:
  #     - ./models:/app/models
  #   restart: unless-stopped
  #   networks:
  #     - transcription-net

networks:
  transcription-net:
    driver: bridge
  vexa-network:
    external: true
    name: vexa-network
